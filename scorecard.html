.scramble-confirm-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
.scramble-confirm-btn.already { background: rgba(201,162,75,0.15); color: var(--green-accent); border: 1px solid rgba(201,162,75,0.3); }
.scramble-lb { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 80px; }
.scramble-lb-header { padding: 10px 16px; font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); }
.scramble-lb-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }

.team-name-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 28px 24px; max-width: 360px; width: 100%; text-align: center; }

<script>
  // ==================== SCORE EFFECTS (emoji burst) ====================
  // Defined at script scope so both solo and group modes can access them
  function getScoreEffectTier(score, par) {
    if (!score || score <= 0) return null;
    if (score === 1) return { name: 'Hole-in-One!', emoji: '🏆', holdTime: 2800, cssClass: 'ace' };
    var diff = score - par;
    if (diff <= -3) return { name: 'Albatross!', emoji: '🦅', holdTime: 2600, cssClass: 'eagle' };
    if (diff === -2) return { name: 'Eagle!', emoji: '🦅', holdTime: 2400, cssClass: 'eagle' };
    if (diff === -1) return { name: 'Birdie!', emoji: '🐦', holdTime: 2200, cssClass: 'birdie' };
    if (diff === 0) return { name: 'Par', emoji: '⛳', holdTime: 2000, cssClass: 'par-score' };
    if (diff === 1) return { name: 'Bogey', emoji: '😬', holdTime: 2000, cssClass: 'bogey' };
    if (diff === 2) return { name: 'Double Bogey', emoji: '💀', holdTime: 2000, cssClass: 'double-plus' };
    return { name: 'Triple+', emoji: '🧑🏽‍🦼', holdTime: 2200, cssClass: 'double-plus' };
  }

  // Shows effect and calls onDone when animation is fully finished
  function showScoreEffect(score, par, onDone) {
    var tier = getScoreEffectTier(score, par);
    if (!tier) { if (onDone) onDone(); return; }
    var container = spawnEmojiBurst(tier);
    // Wait for grid to fill in, then show the announcement inside the container
    var popInTime = 600;
    setTimeout(function() {
      var el = document.createElement('div');
      el.className = 'score-announce';
      el.innerHTML = '<span class="score-announce-emoji">' + tier.emoji + '</span>' +
                     '<span class="score-announce-text ' + tier.cssClass + '">' + tier.name + '</span>';
      container.appendChild(el);
    }, popInTime);
    // Hold the filled screen, then fade everything out together, then advance
    setTimeout(function() {
      container.classList.add('fade-out');
      setTimeout(function() {
        if (container.parentNode) container.parentNode.removeChild(container);
        if (onDone) onDone();
      }, 500);
    }, popInTime + tier.holdTime);
  }

  function spawnEmojiBurst(tier) {
    var container = document.createElement('div');
    container.className = 'score-effect-container';
    document.body.appendChild(container);

    // Calculate grid to fill the viewport
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var cellSize = 50;
    var cols = Math.ceil(vw / cellSize) + 1;
    var rows = Math.ceil(vh / cellSize) + 1;
    var total = cols * rows;
    var fontSize = cellSize;

    // Shuffled delay indices for random pop-in wave
    var indices = [];
    for (var n = 0; n < total; n++) indices.push(n);
    for (var s = indices.length - 1; s > 0; s--) {
      var j = Math.floor(Math.random() * (s + 1));
      var tmp = indices[s]; indices[s] = indices[j]; indices[j] = tmp;
    }

    var maxDelay = 0.5;
    for (var i = 0; i < total; i++) {
      var row = Math.floor(i / cols);
      var col = i % cols;
      var p = document.createElement('div');
      p.className = 'emoji-burst-particle';
      p.textContent = tier.emoji;
      // Explicit inline position and size — no CSS variables
      p.style.left = (col * cellSize) + 'px';
      p.style.top = (row * cellSize) + 'px';
      p.style.width = cellSize + 'px';
      p.style.height = cellSize + 'px';
      p.style.fontSize = fontSize + 'px';
      p.style.animationDelay = ((indices[i] / total) * maxDelay).toFixed(3) + 's';
      container.appendChild(p);
    }

    return container;
  }

  // ===================================================================
  // HOLE PICKER MODAL — tap the hole number to jump to any hole
  // Each render mode sets window._hpState so this function stays generic
  // ===================================================================
  window._hpState = null; // { course, currentHole, scored[] }

  window.showHolePicker = function() {
    if (!window._hpState) return;
    if (document.getElementById('holePickerModal')) return;

    var state = window._hpState;
    var course = state.course;
    var cur = state.currentHole;
    var scored = state.scored; // boolean[18]

    var grid = '';
    for (var i = 0; i < 18; i++) {
      var hole = course.holes[i];
      var isCur = i === cur;
      var isScored = scored[i];
      var bg, border, color;
      if (isCur) {
        bg = 'rgba(212,175,55,0.25)'; border = '2px solid #d4af37'; color = '#d4af37';
      } else if (isScored) {
        bg = 'rgba(201,162,75,0.12)'; border = '1px solid rgba(201,162,75,0.3)'; color = '#00e676';
      } else {
        bg = 'rgba(255,255,255,0.05)'; border = '1px solid rgba(255,255,255,0.1)'; color = '#bbb';
      }
      grid +=
        '<button onclick="goToHole(' + i + ');document.getElementById(\'holePickerModal\').remove()" ' +
        'style="width:calc(16.666% - 5px);aspect-ratio:1;display:flex;flex-direction:column;align-items:center;' +
        'justify-content:center;border-radius:8px;cursor:pointer;background:' + bg + ';border:' + border + ';color:' + color + ';padding:0">' +
          '<span style="font-size:15px;font-weight:700;line-height:1">' + (i + 1) + '</span>' +
          '<span style="font-size:9px;font-weight:400;opacity:0.7;margin-top:2px">Par ' + hole.par + '</span>' +
        '</button>';
    }

    var overlay = document.createElement('div');
    overlay.id = 'holePickerModal';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:flex-end;justify-content:center';
    overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
    overlay.innerHTML =
      '<div style="background:#121f14;border-radius:16px 16px 0 0;padding:16px;width:100%;max-width:460px;padding-bottom:calc(16px + env(safe-area-inset-bottom))">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">' +
          '<span style="font-size:14px;font-weight:700;color:#fff">Jump to Hole</span>' +
          '<button onclick="document.getElementById(\'holePickerModal\').remove()" style="background:none;border:none;color:#666;font-size:22px;line-height:1;cursor:pointer;padding:0">&times;</button>' +
        '</div>' +
        '<div style="display:flex;flex-wrap:wrap;gap:6px">' + grid + '</div>' +
        '<div style="margin-top:10px;font-size:11px;color:#555;text-align:center">' +
          '<span style="color:#d4af37">&#9632;</span> Current &nbsp;' +
          '<span style="color:#00e676">&#9632;</span> Scored &nbsp;' +
          '<span style="color:#555">&#9632;</span> Not yet played' +
        '</div>' +
      '</div>';
    document.body.appendChild(overlay);
  };

  // ===================================================================
  // TEMPORARY HOLE MODAL — admin-only, group sessions, current hole only
  // Lets the host swap the CURRENT hole's par/yards for a temp hole.
  // Persists to Firebase under meta.holeOverrides; all clients see it live.
  // The override auto-clears when the admin moves to a different hole.
  // ===================================================================
  window.showTempHoleModal = function() {
    if (!window._hpState) return;
    if (document.getElementById('tempHoleModal')) return;
    var state = window._hpState;
    if (!state.groupCode || !state.isAdmin) return;

    var baseCourse = state.baseCourse || state.course;
    var overrides = state.overrides || {};
    var idx = state.currentHole || 0;
    var origHole = baseCourse.holes[idx];
    var existing = overrides[idx] || null;

    var overlay = document.createElement('div');
    overlay.id = 'tempHoleModal';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px';
    overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
    overlay.innerHTML =
      '<div style="background:#121f14;border:1px solid rgba(245,166,35,0.3);border-radius:14px;padding:20px;width:100%;max-width:380px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">' +
          '<span style="font-size:15px;font-weight:800;color:#f5a623">Temporary Hole</span>' +
          '<button onclick="document.getElementById(\'tempHoleModal\').remove()" style="background:none;border:none;color:#666;font-size:22px;line-height:1;cursor:pointer;padding:0">&times;</button>' +
        '</div>' +
        '<p style="font-size:12px;color:#7a9e86;margin-bottom:14px;line-height:1.4">Override par/yards for the hole you&rsquo;re currently on. All players see the change immediately on this hole. The override stays until you remove it &mdash; navigate back to this hole anytime to edit or remove.</p>' +

        '<div style="background:rgba(245,166,35,0.06);border:1px solid rgba(245,166,35,0.25);border-radius:8px;padding:10px 12px;margin-bottom:14px">' +
          '<div style="font-size:10px;font-weight:700;color:#bbb;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:3px">Current hole</div>' +
          '<div style="font-size:14px;font-weight:700;color:#e8f5e9">Hole ' + (idx + 1) + ' &mdash; original Par ' + origHole.par + '</div>' +
          (existing ? '<div style="font-size:11px;color:#f5a623;margin-top:4px">Currently overridden: Par ' + existing.par + ', ' + existing.yards + 'y</div>' : '') +
        '</div>' +

        '<label style="display:block;font-size:11px;font-weight:700;color:#bbb;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px">Par</label>' +
        '<div id="tempParBtns" style="display:flex;gap:8px;margin-bottom:14px">' +
          '<button data-par="3" onclick="setTempPar(3)" style="flex:1;padding:11px;background:rgba(255,255,255,0.05);border:1px solid #2a3a2e;border-radius:8px;color:#e8f5e9;font-size:14px;font-weight:700;cursor:pointer">Par 3</button>' +
          '<button data-par="4" onclick="setTempPar(4)" style="flex:1;padding:11px;background:rgba(255,255,255,0.05);border:1px solid #2a3a2e;border-radius:8px;color:#e8f5e9;font-size:14px;font-weight:700;cursor:pointer">Par 4</button>' +
          '<button data-par="5" onclick="setTempPar(5)" style="flex:1;padding:11px;background:rgba(255,255,255,0.05);border:1px solid #2a3a2e;border-radius:8px;color:#e8f5e9;font-size:14px;font-weight:700;cursor:pointer">Par 5</button>' +
        '</div>' +

        '<label style="display:block;font-size:11px;font-weight:700;color:#bbb;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px">Total Yards</label>' +
        '<input id="tempYards" type="number" inputmode="numeric" min="50" max="700" placeholder="e.g. 140" ' +
          'style="width:100%;padding:11px;background:#132017;border:1px solid #2a3a2e;border-radius:8px;color:#e8f5e9;font-size:14px;margin-bottom:18px">' +

        '<button id="tempHoleSaveBtn" onclick="saveTempHole()" style="width:100%;padding:13px;background:linear-gradient(135deg,#b8860b,#d4af37);color:#1a1a1a;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:8px">' + (existing ? 'Update Temporary Hole' : 'Apply Temporary Hole') + '</button>' +
        (existing ? '<button id="tempHoleRemoveBtn" onclick="removeTempHole()" style="width:100%;padding:11px;background:none;color:#ff5252;border:1px solid rgba(255,82,82,0.4);border-radius:10px;font-size:13px;font-weight:700;cursor:pointer">Remove Temp Hole</button>' : '') +
      '</div>';
    document.body.appendChild(overlay);

    if (existing) {
      window.setTempPar(existing.par);
      document.getElementById('tempYards').value = existing.yards;
    } else {
      window.setTempPar(origHole.par);
      document.getElementById('tempYards').value = '';
    }
  };

  window._tempPar = null;
  window.setTempPar = function(p) {
    window._tempPar = p;
    var btns = document.querySelectorAll('#tempParBtns button');
    btns.forEach(function(b) {
      var active = parseInt(b.getAttribute('data-par'), 10) === p;
      b.style.background = active ? 'rgba(245,166,35,0.18)' : 'rgba(255,255,255,0.05)';
      b.style.borderColor = active ? 'rgba(245,166,35,0.6)' : '#2a3a2e';
      b.style.color = active ? '#f5a623' : '#e8f5e9';
    });
  };

  window.saveTempHole = function() {
    var state = window._hpState;
    if (!state || !state.groupCode || !state.isAdmin) return;
    var idx = state.currentHole || 0;
    var par = window._tempPar;
    var yards = parseInt(document.getElementById('tempYards').value, 10);
    if ([3, 4, 5].indexOf(par) === -1) { alert('Pick a par (3, 4, or 5).'); return; }
    if (!yards || yards < 50 || yards > 700) { alert('Enter total yards (50–700).'); return; }
    var hcp = computeAutoHcp(state.baseCourse || state.course, par, idx);
    setHoleOverride(state.groupCode, idx, { par: par, yards: yards, hcp: hcp }).then(function() {
      var modal = document.getElementById('tempHoleModal');
      if (modal) modal.remove();
    }).catch(function(e) {
      alert('Failed to save: ' + (e && e.message ? e.message : 'unknown error'));
    });
  };

  window.removeTempHole = function() {
    var state = window._hpState;
    if (!state || !state.groupCode || !state.isAdmin) return;
    var idx = state.currentHole || 0;
    if (!confirm('Remove the temporary hole and restore Hole ' + (idx + 1) + ' to its original par/yards?')) return;
    clearHoleOverride(state.groupCode, idx).then(function() {
      var modal = document.getElementById('tempHoleModal');
      if (modal) modal.remove();
    }).catch(function(e) {
      alert('Failed to remove: ' + (e && e.message ? e.message : 'unknown error'));
    });
  };

  requireAuth(function(user) {
    renderBottomNav('courses');
    renderUserHeader(user);
    renderBroadcastBanner();
    renderRoundBroadcastListener();

    const urlParams = new URLSearchParams(window.location.search);
    let groupCode = urlParams.get('group');

    // If no group code in URL, check localStorage for active group
    if (!groupCode) {
      const storedCode = localStorage.getItem('active-group-code');
      if (storedCode) groupCode = storedCode;
    }

    if (groupCode) {
      initGroupRound(user, groupCode);
    } else {
      // No local group code — check Firebase for any round this user is in
      findActiveRoundForUser(user.uid).then(function(found) {
        if (found) {
          localStorage.setItem('active-group-code', found.code);
          initGroupRound(user, found.code);
        } else {
          initSoloRound(user);
        }
      });
    }
  });

  // ===================================================================
  // SHARED — Mulligan Location Modal (used by both solo and group)
  // ===================================================================
  var pendingHoleIdx = null;
  var mulliganModalMode = null; // 'solo' or 'group'
  var mulliganModalPlayer = null; // player name (solo) or null (group)
  var _mulliganConfirmCallback = null; // set by each mode to handle post-confirm

  function ensureMulliganModal() {
    if (document.getElementById('mulliganModal')) return;
    // Inject styles if old cached CSS doesn't have them
    if (!document.getElementById('mulliganStyles')) {
      var style = document.createElement('style');
      style.id = 'mulliganStyles';
      style.textContent =
        '.mulligan-item{margin-bottom:16px}.mulligan-item:last-child{margin-bottom:0}' +
        '.mulligan-label{font-size:12px;font-weight:700;color:#d4af37;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}' +
        '.mulligan-options{display:flex;gap:6px}' +
        '.mulligan-option{flex:1;padding:10px 6px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:#132017;color:#999;font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all 0.15s ease}' +
        '.mulligan-option.selected{border-color:#d4af37;background:rgba(212,175,55,0.15);color:#d4af37}' +
        '@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}';
      document.head.appendChild(style);
    }
    // Create modal dynamically so it works even if old HTML is cached
    var overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'mulliganModal';
    overlay.innerHTML =
      '<div class="modal">' +
        '<h3 id="mulliganModalTitle">Mulligan Recap</h3>' +
        '<p style="font-size:13px;color:var(--text-dim);margin-bottom:16px">Where did you take each mulligan?</p>' +
        '<div id="mulliganModalBody"></div>' +
        '<div class="modal-actions">' +
          '<button class="btn-gold" id="mulliganDoneBtn" onclick="confirmMulliganLocations()">Done</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(overlay);
  }

  function showMulliganModal(playerName, count, holeIdx) {
    ensureMulliganModal();
    var modal = document.getElementById('mulliganModal');
    var body = document.getElementById('mulliganModalBody');
    document.getElementById('mulliganModalTitle').textContent = 'Hole ' + (holeIdx + 1) + ' — Mulligans';
    var html = '';
    for (var i = 0; i < count; i++) {
      html += '<div class="mulligan-item">';
      html += '<div class="mulligan-label">Mulligan ' + (i + 1) + '</div>';
      html += '<div class="mulligan-options" data-index="' + i + '">';
      html += '<button class="mulligan-option" data-value="tee" onclick="selectMulliganLoc(this)">Off the Tee</button>';
      html += '<button class="mulligan-option" data-value="fairway" onclick="selectMulliganLoc(this)">On the Fairway</button>';
      html += '<button class="mulligan-option" data-value="green" onclick="selectMulliganLoc(this)">On the Green</button>';
      html += '</div></div>';
    }
    body.innerHTML = html;
    modal.classList.add('show');
  }

  window.selectMulliganLoc = function(btn) {
    var siblings = btn.parentElement.querySelectorAll('.mulligan-option');
    siblings.forEach(function(s) { s.classList.remove('selected'); });
    btn.classList.add('selected');
  };

  window.confirmMulliganLocations = function() {
    var groups = document.querySelectorAll('#mulliganModalBody .mulligan-options');
    var locations = [];
    var allSelected = true;
    groups.forEach(function(g) {
      var sel = g.querySelector('.mulligan-option.selected');
      if (!sel) { allSelected = false; }
      else { locations.push(sel.getAttribute('data-value')); }
    });
    if (!allSelected) {
      var btn = document.getElementById('mulliganDoneBtn');
      btn.style.animation = 'none';
      btn.offsetHeight;
      btn.style.animation = 'shake 0.3s ease';
      return;
    }
    // Close modal
    document.getElementById('mulliganModal').classList.remove('show');
    // Callback handles saving + advancing
    if (_mulliganConfirmCallback) {
      _mulliganConfirmCallback(locations);
      _mulliganConfirmCallback = null;
    }
  };

  // ===================================================================
  // SHARED — Drop Location Modal (used by both solo and group)
  // ===================================================================
  var _dropConfirmCallback = null;

  function ensureDropModal() {
    if (document.getElementById('dropModal')) return;
    if (!document.getElementById('dropStyles')) {
      var style = document.createElement('style');
      style.id = 'dropStyles';
      style.textContent =
        '.drop-item{margin-bottom:16px}.drop-item:last-child{margin-bottom:0}' +
        '.drop-label{font-size:12px;font-weight:700;color:#e53935;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}' +
        '.drop-options{display:flex;gap:6px}' +
        '.drop-option{flex:1;padding:10px 6px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:#132017;color:#999;font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all 0.15s ease}' +
        '.drop-option.selected{border-color:#e53935;background:rgba(229,57,53,0.15);color:#e53935}';
      document.head.appendChild(style);
    }
    var overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'dropModal';
    overlay.innerHTML =
      '<div class="modal">' +
        '<h3 id="dropModalTitle">Drop Recap</h3>' +
        '<p style="font-size:13px;color:var(--text-dim);margin-bottom:16px">What was each drop for?</p>' +
        '<div id="dropModalBody"></div>' +
        '<div class="modal-actions">' +
          '<button class="btn-gold" id="dropDoneBtn" onclick="confirmDropLocations()" style="background:#e53935">Done</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(overlay);
  }

  function showDropModal(playerName, count, holeIdx) {
    ensureDropModal();
    var modal = document.getElementById('dropModal');
    var body = document.getElementById('dropModalBody');
    document.getElementById('dropModalTitle').textContent = 'Hole ' + (holeIdx + 1) + ' — Drops';
    var html = '';
    for (var i = 0; i < count; i++) {
      html += '<div class="drop-item">';
      html += '<div class="drop-label">Drop ' + (i + 1) + '</div>';
      html += '<div class="drop-options" data-index="' + i + '">';
      html += '<button class="drop-option" data-value="water" onclick="selectDropLoc(this)">Water</button>';
      html += '<button class="drop-option" data-value="ob" onclick="selectDropLoc(this)">OB</button>';
      html += '<button class="drop-option" data-value="lateral" onclick="selectDropLoc(this)">Lateral</button>';
      html += '<button class="drop-option" data-value="unplayable" onclick="selectDropLoc(this)">Unplayable</button>';
      html += '</div></div>';
    }
    body.innerHTML = html;
    modal.classList.add('show');
  }

  window.selectDropLoc = function(btn) {
    var siblings = btn.parentElement.querySelectorAll('.drop-option');
    siblings.forEach(function(s) { s.classList.remove('selected'); });
    btn.classList.add('selected');
  };

  window.confirmDropLocations = function() {
    var groups = document.querySelectorAll('#dropModalBody .drop-options');
    var locations = [];
    var allSelected = true;
    groups.forEach(function(g) {
      var sel = g.querySelector('.drop-option.selected');
      if (!sel) { allSelected = false; }
      else { locations.push(sel.getAttribute('data-value')); }
    });
    if (!allSelected) {
      var btn = document.getElementById('dropDoneBtn');
      btn.style.animation = 'none';
      btn.offsetHeight;
      btn.style.animation = 'shake 0.3s ease';
      return;
    }
    document.getElementById('dropModal').classList.remove('show');
    if (_dropConfirmCallback) {
      _dropConfirmCallback(locations);
      _dropConfirmCallback = null;
    }
  };

  // ===================================================================
  // SOLO MODE — existing localStorage-based play (mostly unchanged)
  // ===================================================================
  function initSoloRound(user) {
    let R = getActiveRound();

    if (!R) {
      document.getElementById('mainContent').innerHTML = `
        <div class="empty-state">
          <div class="icon">&#127948;</div>
          <p>No active round.<br><a href="index.html">Choose a course</a> to start playing.</p>
        </div>
      `;
      return;
    }

    const course = getCourse(R.courseId);
    let currentHole = R.currentHole || 0;

    // Apply sunset theme for "other" courses
    if (course && course.group === 'other') {
      document.body.classList.add('sunset-theme');
      document.querySelector('meta[name="theme-color"]').content = '#0f0a07';
    }

    if (!R.tracking) {
      R.tracking = {};
      R.players.forEach(p => R.tracking[p] = createPlayerTracking());
      save();
    }
    // Backfill mulliganLocations and penaltyLocations for older rounds
    R.players.forEach(p => {
      if (R.tracking[p] && !R.tracking[p].mulliganLocations) {
        R.tracking[p].mulliganLocations = new Array(18).fill(null);
      }
      if (R.tracking[p] && !R.tracking[p].penaltyLocations) {
        R.tracking[p].penaltyLocations = new Array(18).fill(null);
      }
    });

    document.getElementById('courseName').textContent = course.name;
    document.getElementById('courseSub').textContent = `${R.teeLabel} Tees  |  Par ${course.par}  |  ${formatDate(R.date)}`;

    // Auto-set current hole to par if unscored on initial load
    const initHole = course.holes[currentHole];
    R.players.forEach(p => {
      if (R.scores[p][currentHole] === 0) {
        R.scores[p][currentHole] = initHole.par;
      }
    });

    function save() {
      R.currentHole = currentHole;
      setActiveRound(R);
    }

    // Determine the current playable hole — the first hole with no score for any player
    function getPlayableHole() {
      for (let i = 0; i < 18; i++) {
        const allScored = R.players.every(p => R.scores[p][i] > 0);
        if (!allScored) return i;
      }
      return 17; // all holes scored
    }

    function render() {
      const hole = course.holes[currentHole];
      const teeKey = R.tee;
      const yardage = hole[teeKey] || '—';
      const playableHole = getPlayableHole();

      // Update hole picker state
      window._hpState = {
        course: course,
        currentHole: currentHole,
        scored: Array.from({length: 18}, function(_, i) {
          return R.players.some(function(p) { return R.scores[p][i] > 0; });
        })
      };

      let html = '';

      // Leaderboard link
      html += '<a href="live-game.html" class="leaderboard-link">&#127942; View Leaderboard</a>';

      // Hole strip
      html += '<div class="hole-strip" id="holeStrip">';
      for (let i = 0; i < 18; i++) {
        const anyScored = R.players.some(p => R.scores[p][i] > 0);
        let cls = i === currentHole ? 'active' : (anyScored ? 'scored' : '');
        if (i > playableHole && i !== currentHole) cls += ' future';
        html += `<div class="hole-pip ${cls}" onclick="goToHole(${i})">${i+1}</div>`;
      }
      html += '</div>';
      html += '<button onclick="showHolePicker()" style="width:100%;padding:8px;margin:6px 0 2px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#bbb;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:0.3px">&#8597; Jump to Hole</button>';

      // Hole display
      html += `
        <div class="hole-display">
          <div class="hole-number">Hole ${hole.num}</div>
          <div class="hole-info-chips">
            <span class="info-chip par-chip">Par ${hole.par}</span>
            <span class="info-chip">${yardage} yds</span>
            <span class="info-chip">HCP ${hole.hcp}</span>
          </div>
        </div>
      `;

      // Hole layout image
      if (hole.img) {
        html += `<div class="hole-layout-container" id="layoutContainer">
          <div class="hole-layout-toggle" onclick="document.getElementById('layoutContainer').classList.toggle('expanded')">
            <span class="layout-icon">🗺️</span>
            <span class="layout-label">View Hole Layout</span>
            <span class="layout-chevron">▼</span>
          </div>
          <div class="hole-layout-img-wrap">
            <img src="${hole.img}" alt="Hole ${hole.num} layout" loading="lazy">
          </div>
        </div>`;
      }

      // Course overview map
      if (course.overview) {
        html += `<div class="hole-layout-container" id="courseOverviewContainer">
          <div class="hole-layout-toggle" onclick="document.getElementById('courseOverviewContainer').classList.toggle('expanded')">
            <span class="layout-icon">🏌️</span>
            <span class="layout-label">View Course Map</span>
            <span class="layout-chevron">▼</span>
          </div>
          <div class="hole-layout-img-wrap">
            <img src="${course.overview}" alt="${course.name} course map" loading="lazy">
          </div>
        </div>`;
      }

      // Player cards
      R.players.forEach((p, pIdx) => {
          const score = R.scores[p][currentHole];
          const scoreClass = getScoreClass(score, hole.par);
          const label = getScoreLabel(score, hole.par);
          const t = R.tracking[p];

          const totalScore = R.scores[p].reduce((a, b) => a + b, 0);
          const holesPlayed = R.scores[p].filter(s => s > 0).length;
          const parPlayed = course.holes.filter((h, i) => R.scores[p][i] > 0).reduce((a, h) => a + h.par, 0);
          const diff = totalScore - parPlayed;
          let badgeClass = 'even', badgeText = 'E';
          if (holesPlayed === 0) { badgeText = '—'; }
          else if (diff < 0) { badgeClass = 'under'; badgeText = diff.toString(); }
          else if (diff > 0) { badgeClass = 'over'; badgeText = '+' + diff; }

          const pSafe = p.replace(/'/g, "\\'");

          html += `
            <div class="player-score-card" data-player="${pSafe}">
              <div class="player-score-header">
                <span class="player-score-name">${p}</span>
                <span class="player-total-badge ${badgeClass}">${holesPlayed > 0 ? totalScore + ' (' + badgeText + ')' : '—'}</span>
              </div>
              <div class="score-stepper">
                <button class="step-btn minus" onclick="adj('${pSafe}', -1)">&minus;</button>
                <div class="score-big ${scoreClass}">${score || '—'}</div>
                <button class="step-btn plus" onclick="adj('${pSafe}', 1)">+</button>
              </div>
              <div class="score-label ${scoreClass}">${label}</div>
              <div class="putts-row">
                <span class="putts-label">Putts <span class="label-emoji">⛳️</span></span>
                <div class="putt-stepper">
                  <button class="putt-btn p-minus" onclick="adjPutt('${pSafe}', -1)">&minus;</button>
                  <div class="putt-val">${t.putts[currentHole] || 0}</div>
                  <button class="putt-btn p-plus" onclick="adjPutt('${pSafe}', 1)">+</button>
                </div>
              </div>
              <div class="putts-row mulligan-row">
                <span class="putts-label mulligan-label-text">Mulligan <span class="label-emoji">🔄</span></span>
                <div class="putt-stepper">
                  <button class="putt-btn p-minus mulligan-btn" onclick="adjMulligan('${pSafe}', -1)">&minus;</button>
                  <div class="putt-val mulligan-val">${t.mulligans[currentHole] || 0}</div>
                  <button class="putt-btn p-plus mulligan-btn" onclick="adjMulligan('${pSafe}', 1)">+</button>
                </div>
              </div>
              <div class="putts-row penalty-row">
                <span class="putts-label penalty-label-text">Drop <span class="label-emoji">🫳🏼</span></span>
                <div class="putt-stepper">
                  <button class="putt-btn p-minus penalty-btn" onclick="adjPenalty('${pSafe}', -1)">&minus;</button>
                  <div class="putt-val penalty-val">${t.penalties[currentHole] || 0}</div>
                  <button class="putt-btn p-plus penalty-btn" onclick="adjPenalty('${pSafe}', 1)">+</button>
                </div>
              </div>
            </div>
          `;

          // Hole nav buttons — right after the first player's score counter
          if (pIdx === 0) {
            html += '<div class="hole-nav-row">';
            if (currentHole > 0) {
              html += `<button class="hole-nav-btn prev" onclick="goToHole(${currentHole - 1})">&larr; Hole ${currentHole}</button>`;
            } else {
              html += '<div></div>';
            }
            if (currentHole < 17) {
              html += `<button class="hole-nav-btn next" onclick="goToHole(${currentHole + 1})">Hole ${currentHole + 2} &rarr;</button>`;
            } else {
              html += `<button class="hole-nav-btn next" onclick="finishRound()" style="background:var(--gold);color:#1a1a1a;">Finish Round</button>`;
            }
            html += '</div>';
          }
        });

      html += `
        <div class="finish-section">
          <button class="btn-gold" onclick="finishRound()">Save & Finish</button>
          <button class="btn-secondary" onclick="cancelRound()">Cancel</button>
        </div>
      `;

      document.getElementById('mainContent').innerHTML = html;

      setTimeout(() => {
        const strip = document.getElementById('holeStrip');
        const activePip = strip?.querySelector('.hole-pip.active');
        if (activePip && strip) {
          activePip.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }
      }, 50);
    }

    // Check for pending drop locations, then advance
    function checkDropsThenAdvance(idx) {
      var playerWithDrops = null;
      R.players.forEach(function(p) {
        var count = R.tracking[p].penalties[currentHole];
        var pl = R.tracking[p].penaltyLocations;
        if (count > 0 && !(pl && pl[currentHole])) {
          playerWithDrops = p;
        }
      });
      if (playerWithDrops) {
        var holeAtPrompt = currentHole;
        var p = playerWithDrops;
        if (!R.tracking[p].penaltyLocations) {
          R.tracking[p].penaltyLocations = new Array(18).fill(null);
        }
        _dropConfirmCallback = function(locations) {
          R.tracking[p].penaltyLocations[holeAtPrompt] = locations;
          save();
          proceedToHole(idx);
        };
        showDropModal(p, R.tracking[p].penalties[currentHole], currentHole);
        return;
      }
      proceedToHole(idx);
    }

    window.goToHole = function(idx) {
      // Check if moving forward — prompt for mulligan locations, then drop locations
      if (idx > currentHole) {
        var playerWithMulligans = null;
        R.players.forEach(function(p) {
          var count = R.tracking[p].mulligans[currentHole];
          var ml = R.tracking[p].mulliganLocations;
          if (count > 0 && !(ml && ml[currentHole])) {
            playerWithMulligans = p;
          }
        });
        if (playerWithMulligans) {
          var holeAtPrompt = currentHole;
          var p = playerWithMulligans;
          if (!R.tracking[p].mulliganLocations) {
            R.tracking[p].mulliganLocations = new Array(18).fill(null);
          }
          _mulliganConfirmCallback = function(locations) {
            R.tracking[p].mulliganLocations[holeAtPrompt] = locations;
            save();
            checkDropsThenAdvance(idx);
          };
          showMulliganModal(p, R.tracking[p].mulligans[currentHole], currentHole);
          return;
        }
        // No mulligans pending — check drops
        checkDropsThenAdvance(idx);
        return;
      }
      proceedToHole(idx);
    };

    function proceedToHole(idx) {
      // Show score effect when moving forward, wait for it to finish
      if (idx > currentHole) {
        var prevPar = course.holes[currentHole].par;
        var prevScore = R.scores[R.players[0]][currentHole];
        if (prevScore > 0) {
          showScoreEffect(prevScore, prevPar, function() {
            doAdvanceHole(idx);
          });
          return;
        }
      }
      doAdvanceHole(idx);
    }
    function doAdvanceHole(idx) {
      currentHole = idx;
      const hole = course.holes[currentHole];
      R.players.forEach(p => {
        var isNewHole = R.scores[p][currentHole] === 0;
        if (isNewHole) {
          R.scores[p][currentHole] = hole.par;
        }
        // Force tracking to 0 for brand-new holes
        if (R.tracking[p] && isNewHole) {
          R.tracking[p].putts[currentHole] = 0;
          R.tracking[p].mulligans[currentHole] = 0;
          R.tracking[p].penalties[currentHole] = 0;
        }
      });
      save(); render(); window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    // Surgical DOM updates for solo mode (no full re-render, no scroll jump)
    function updateSoloCard(player) {
      const card = document.querySelector('.player-score-card[data-player="' + player.replace(/'/g, "\\'") + '"]');
      if (!card) return;
      const hole = course.holes[currentHole];
      const score = R.scores[player][currentHole];
      const scoreClass = getScoreClass(score, hole.par);
      const label = getScoreLabel(score, hole.par);
      const t = R.tracking[player];

      const scoreBig = card.querySelector('.score-big');
      if (scoreBig) { scoreBig.textContent = score || '—'; scoreBig.className = 'score-big ' + scoreClass; }

      const scoreLabel = card.querySelector('.score-label');
      if (scoreLabel) { scoreLabel.textContent = label; scoreLabel.className = 'score-label ' + scoreClass; }

      const totalScore = R.scores[player].reduce((a, b) => a + b, 0);
      const holesPlayed = R.scores[player].filter(s => s > 0).length;
      const parPlayed = course.holes.filter((h, i) => R.scores[player][i] > 0).reduce((a, h) => a + h.par, 0);
      const diff = totalScore - parPlayed;
      let badgeClass = 'even', badgeText = 'E';
      if (holesPlayed === 0) { badgeText = '—'; }
      else if (diff < 0) { badgeClass = 'under'; badgeText = diff.toString(); }
      else if (diff > 0) { badgeClass = 'over'; badgeText = '+' + diff; }

      const badge = card.querySelector('.player-total-badge');
      if (badge) { badge.className = 'player-total-badge ' + badgeClass; badge.textContent = holesPlayed > 0 ? totalScore + ' (' + badgeText + ')' : '—'; }

      const puttVal = card.querySelector('.putt-val');
      if (puttVal) puttVal.textContent = t.putts[currentHole] || 0;

      const mulliganVal = card.querySelector('.mulligan-val');
      if (mulliganVal) mulliganVal.textContent = t.mulligans[currentHole] || 0;

      const penaltyVal = card.querySelector('.penalty-val');
      if (penaltyVal) penaltyVal.textContent = t.penalties[currentHole] || 0;
    }

    window.adj = function(player, delta) { R.scores[player][currentHole] = Math.max(1, Math.min(15, R.scores[player][currentHole] + delta)); save(); updateSoloCard(player); };
    window.adjPutt = function(player, delta) { R.tracking[player].putts[currentHole] = Math.max(0, Math.min(10, R.tracking[player].putts[currentHole] + delta)); save(); updateSoloCard(player); };
    window.adjMulligan = function(player, delta) {
      var current = R.tracking[player].mulligans[currentHole];
      R.tracking[player].mulligans[currentHole] = Math.max(0, Math.min(5, current + delta));
      if (!R.tracking[player].mulliganLocations) R.tracking[player].mulliganLocations = new Array(18).fill(null);
      R.tracking[player].mulliganLocations[currentHole] = null;
      save(); updateSoloCard(player);
    };
    window.adjPenalty = function(player, delta) {
      var current = R.tracking[player].penalties[currentHole];
      R.tracking[player].penalties[currentHole] = Math.max(0, Math.min(10, current + delta));
      if (!R.tracking[player].penaltyLocations) R.tracking[player].penaltyLocations = new Array(18).fill(null);
      R.tracking[player].penaltyLocations[currentHole] = null;
      save(); updateSoloCard(player);
    };

    window.finishRound = function() {
      const anyScored = R.players.some(p => R.scores[p].some(s => s > 0));
      if (!anyScored) { alert('No scores entered yet.'); return; }

      // Check if any player has incomplete holes
      const anyIncomplete = R.players.some(p => R.scores[p].filter(s => s > 0).length < 18);
      const confirmMsg = anyIncomplete
        ? 'Some holes are incomplete. Save as incomplete round?'
        : 'Finish and save this round?';
      if (!confirm(confirmMsg)) return;

      // Build holesCompleted per player
      const holesCompleted = {};
      R.players.forEach(function(p) {
        holesCompleted[p] = R.scores[p].filter(s => s > 0).length;
      });

      const round = {
        id: Date.now().toString(),
        courseId: course.id,
        courseName: course.name,
        tee: R.tee,
        teeLabel: R.teeLabel,
        par: course.par,
        date: R.date,
        players: [...R.players],
        scores: JSON.parse(JSON.stringify(R.scores)),
        tracking: JSON.parse(JSON.stringify(R.tracking)),
        holePars: course.holes.map(h => h.par),
        holesCompleted: holesCompleted,
        incomplete: anyIncomplete
      };

      // Save to localStorage
      const rounds = loadRounds();
      rounds.push(round);
      saveRounds(rounds);

      // Also save to Firebase
      const currentUser = getCurrentUser();
      if (currentUser) {
        fbSaveRound(currentUser.uid, round).catch(() => {});
      }

      clearActiveRound();
      window.location.href = 'history.html';
    };

    window.cancelRound = function() {
      if (confirm('Cancel this round? All data will be lost.')) {
        clearActiveRound();
        window.location.href = 'index.html';
      }
    };

    render();
  }

  // ===================================================================
  // GROUP MODE — Firebase real-time play
  // ===================================================================
  function initGroupRound(user, groupCode) {
    const course_ref = { current: null }; // populated from meta
    let currentHole = 0;
    let R = null; // round data built from Firebase
    let unsubscribe = null;
    let unsubConn = null;
    let isConnected = true;

    // Store group code locally for resume
    localStorage.setItem('active-group-code', groupCode);

    // Connection status
    unsubConn = listenConnectionStatus(connected => {
      isConnected = connected;
      const el = document.getElementById('connStatus');
      if (el) {
        el.className = 'connection-status ' + (connected ? 'online' : 'offline');
        el.innerHTML = `<span class="connection-dot"></span>${connected ? 'Live' : 'Offline'}`;
      }
    });

    let initialRenderDone = false;

    // First check if this player already finished this round
    isPlayerFinished(groupCode, user.uid).then(function(finished) {
      if (finished) {
        // Player already finished — don't let them back in
        localStorage.removeItem('active-group-code');
        document.getElementById('mainContent').innerHTML =
          '<div class="empty-state">' +
            '<div class="icon">&#9989;</div>' +
            '<p>You already finished this round.<br>Your scores have been saved.</p>' +
            '<a href="history.html" style="display:inline-block;margin-top:14px;padding:12px 24px;background:var(--green-accent);color:#132017;border-radius:10px;font-weight:700;text-decoration:none">View History</a>' +
          '</div>';
        return;
      }

      // Not finished — proceed with normal real-time listener
      startGroupListener();
    }).catch(function() {
      // If check fails (e.g. round deleted), proceed normally — listener will handle it
      startGroupListener();
    });

    function startGroupListener() {
    var roundEndedHandled = false;
    var prevOverridesJson = null;
    // Listen for real-time updates
    unsubscribe = listenToGroupRound(groupCode, function(data) {
      // Round deleted from Firebase (all players finished and cleanup ran)
      if (!data) {
        localStorage.removeItem('active-group-code');
        return;
      }
      if (!data.meta) return;

      // SCRAMBLE MODE — completely separate code path
      if (data.meta.gameType === 'scramble') {
        handleScrambleData(data);
        return;
      }

      // Detect round ended (by host OR by super admin from dashboard)
      if (data.meta.status === 'ended' && !roundEndedHandled) {
        roundEndedHandled = true;
        // Save the round data with FINAL scores for all players
        (function() {
          var tempR = groupDataToRound(data, groupCode);
          var endedCourse = applyHoleOverrides(getCourse(tempR.courseId), tempR._holeOverrides);
          if (endedCourse) {
            var myName = tempR._uidToName[user.uid];
            var myHolesPlayed = myName ? tempR.scores[myName].filter(function(s) { return s > 0; }).length : 0;
            var holesCompleted = {};
            tempR.players.forEach(function(p) {
              holesCompleted[p] = tempR.scores[p].filter(function(s) { return s > 0; }).length;
            });

            var round = {
              id: Date.now().toString(),
              courseId: endedCourse.id,
              courseName: endedCourse.name,
              tee: tempR.tee,
              teeLabel: tempR.teeLabel,
              par: endedCourse.par,
              date: tempR.date,
              players: tempR.players.slice(),
              scores: JSON.parse(JSON.stringify(tempR.scores)),
              tracking: JSON.parse(JSON.stringify(tempR.tracking)),
              holePars: endedCourse.holes.map(function(h) { return h.par; }),
              groupCode: groupCode,
              holesCompleted: holesCompleted,
              incomplete: myHolesPlayed < 18
            };

            // Check if this player already saved an early copy of this round
            // If so, REPLACE it with the final data (which has everyone's completed scores)
            var rounds = loadRounds();
            var existingIdx = -1;
            for (var ri = rounds.length - 1; ri >= 0; ri--) {
              if (rounds[ri].groupCode === groupCode) {
                existingIdx = ri;
                break;
              }
            }
            if (existingIdx >= 0) {
              // Update the existing round with final scores
              round.id = rounds[existingIdx].id; // keep same ID
              rounds[existingIdx] = round;
              // Also update in Firebase
              fbSaveRound(user.uid, round).catch(function() {});
            } else {
              // No existing copy — save fresh
              fbSaveRound(user.uid, round).catch(function() {});
              rounds.push(round);
            }
            saveRounds(rounds);
          }
        })();

        // Clean up listeners
        if (unsubscribe) unsubscribe();
        if (unsubConn) unsubConn();
        localStorage.removeItem('active-group-code');

        // Show blocking full-screen modal
        var endedModal = document.createElement('div');
        endedModal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;animation:broadcastFadeIn 0.3s ease';
        endedModal.innerHTML =
          '<div style="background:var(--bg-card,#1a2e1a);border:1px solid rgba(255,82,82,0.3);border-radius:16px;padding:32px 24px;max-width:400px;width:100%;text-align:center;box-shadow:0 20px 80px rgba(0,0,0,0.6)">' +
            '<div style="font-size:48px;margin-bottom:12px">&#128721;</div>' +
            '<h3 style="color:var(--red,#ff5252);font-size:20px;margin-bottom:8px">Round Ended</h3>' +
            '<p style="color:var(--text-muted,#7a9e86);font-size:14px;line-height:1.5;margin-bottom:8px">The admin has ended this round for all players.</p>' +
            '<p style="color:var(--text,#e8f5e9);font-size:13px;margin-bottom:24px">Your scores have been saved to your history.</p>' +
            '<button onclick="window.location.href=\'history.html\'" style="width:100%;padding:14px;background:linear-gradient(135deg,#b8860b,#d4af37);color:#1a1a1a;font-size:15px;font-weight:700;border:none;border-radius:10px;cursor:pointer">View History</button>' +
          '</div>';
        document.body.appendChild(endedModal);
        return;
      }

      R = groupDataToRound(data, groupCode);
      const baseCourse = getCourse(R.courseId);
      const course = applyHoleOverrides(baseCourse, R._holeOverrides);
      course_ref.current = course;

      if (!course) {
        document.getElementById('mainContent').innerHTML = '<div class="empty-state"><p>Course not found.</p></div>';
        return;
      }

      // Apply sunset theme for "other" courses
      if (course.group === 'other') {
        document.body.classList.add('sunset-theme');
        document.querySelector('meta[name="theme-color"]').content = '#0f0a07';
      }

      // Update header
      document.getElementById('courseName').textContent = course.name;
      document.getElementById('courseSub').textContent = `${R.teeLabel} Tees  |  Par ${course.par}  |  ${formatDate(R.date)}`;

      var newOverridesJson = JSON.stringify(R._holeOverrides || {});
      var overridesChanged = prevOverridesJson !== null && newOverridesJson !== prevOverridesJson;
      prevOverridesJson = newOverridesJson;

      if (!initialRenderDone) {
        // First load — set starting hole then fetch avatars then full render
        initialRenderDone = true;
        currentHole = R._startingHole || 0;
        fetchPlayerAvatars(R._playerUids, function() {
          renderGroup();
        });
      } else if (overridesChanged) {
        // Admin added/removed/updated a temp hole — full re-render so par/yards/HCP update
        renderGroup();
      } else {
        // Subsequent updates from other users — only update the players leaderboard
        updatePlayersLeaderboard();
      }
    });
    } // end startGroupListener

    // ==================== SCRAMBLE MODE ====================
    var scrambleTeamKey = null; // 'teamA' or 'teamB'
    var scrambleNameModalShown = false;

    function handleScrambleData(data) {
      var status = data.meta.status;
      var course = applyHoleOverrides(getCourse(data.meta.courseId), data.meta && data.meta.holeOverrides);
      course_ref.current = course;

      if (course) {
        if (course.group === 'other') {
          document.body.classList.add('sunset-theme');
          document.querySelector('meta[name="theme-color"]').content = '#0f0a07';
        }
        document.getElementById('courseName').textContent = course.name;
        document.getElementById('courseSub').textContent = (data.meta.teeLabel || '') + ' Tees | Par ' + course.par + ' | ' + formatDate(data.meta.date);
      }

      if (status === 'lobby') {
        renderScrambleLobby(data);
        return;
      }

      if (status === 'ended' && !roundEndedHandled) {
        roundEndedHandled = true;
        saveScrambleRound(data);
        if (unsubscribe) unsubscribe();
        if (unsubConn) unsubConn();
        localStorage.removeItem('active-group-code');
        var endedModal = document.createElement('div');
        endedModal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px';
        endedModal.innerHTML = '<div style="background:var(--bg-card);border:1px solid rgba(255,82,82,0.3);border-radius:16px;padding:32px 24px;max-width:400px;width:100%;text-align:center"><div style="font-size:48px;margin-bottom:12px">🏁</div><h3 style="color:var(--red,#ff5252);font-size:20px;margin-bottom:8px">Round Ended</h3><p style="color:var(--text-muted);font-size:14px;margin-bottom:24px">The admin ended the scramble. Scores saved.</p><button onclick="window.location.href=\'history.html\'" style="width:100%;padding:14px;background:linear-gradient(135deg,#b8860b,#d4af37);color:#1a1a1a;font-size:15px;font-weight:700;border:none;border-radius:10px;cursor:pointer">View History</button></div>';
        document.body.appendChild(endedModal);
        return;
      }

      if (status === 'active' || status === 'finished') {
        // Find my team
        var teams = (data.meta.teams) || { teamA: { members: [] }, teamB: { members: [] } };
        var teamAMembers = teams.teamA.members || [];
        var teamBMembers = teams.teamB.members || [];
        if (teamAMembers.indexOf(user.uid) >= 0) scrambleTeamKey = 'teamA';
        else if (teamBMembers.indexOf(user.uid) >= 0) scrambleTeamKey = 'teamB';

        var myTeam = scrambleTeamKey ? teams[scrambleTeamKey] : null;
        if (myTeam && !myTeam.name && !scrambleNameModalShown) {
          scrambleNameModalShown = true;
          renderScrambleNameModal(scrambleTeamKey);
        } else if (myTeam && myTeam.name) {
          var existingModal = document.getElementById('teamNameModal');
          if (existingModal) existingModal.parentNode.removeChild(existingModal);
        }

        renderScrambleGame(data);
        return;
      }
    }

    function renderScrambleLobby(data) {
      var players = data.players || {};
      var teams = data.meta.teams || { teamA: { name: '', members: [] }, teamB: { name: '', members: [] } };
      var isCreator = data.meta.createdBy === user.uid;
      var teamAuids = teams.teamA.members || [];
      var teamBuids = teams.teamB.members || [];
      var assignedUids = teamAuids.concat(teamBuids);
      var unassigned = Object.keys(players).filter(function(u) { return assignedUids.indexOf(u) < 0; });

      var html = '<div class="scramble-lobby">';
      // Header
      html += '<div style="text-align:center;padding:20px 0 16px">';
      html += '<div style="font-size:36px;margin-bottom:8px">🏌️</div>';
      html += '<h2 style="font-size:20px;color:var(--text);margin-bottom:6px">Scramble Setup</h2>';
      html += '<div style="font-size:12px;color:var(--text-muted)">Code: <span style="font-family:monospace;font-weight:800;color:var(--gold);letter-spacing:3px">' + groupCode + '</span> <button onclick="copyCode()" class="copy-code-btn" style="background:none;border:none;color:var(--text-muted);font-size:11px;text-decoration:underline;cursor:pointer">Copy</button></div>';
      html += '<div style="font-size:12px;color:var(--text-muted);margin-top:4px">' + Object.keys(players).length + '/4 players joined</div>';
      html += '</div>';

      // Teams grid
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">';
      ['teamA', 'teamB'].forEach(function(tk) {
        var memberUids = teams[tk].members || [];
        var color = tk === 'teamA' ? '#64b5f6' : '#ef9a9a';
        var borderColor = tk === 'teamA' ? 'rgba(100,181,246,0.3)' : 'rgba(239,154,154,0.3)';
        var bg = tk === 'teamA' ? 'rgba(100,181,246,0.08)' : 'rgba(239,154,154,0.08)';
        html += '<div style="background:' + bg + ';border:1px solid ' + borderColor + ';border-radius:12px;padding:12px">';
        html += '<div style="font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:' + color + ';margin-bottom:10px">' + (tk === 'teamA' ? '🔵 Team A' : '🔴 Team B') + ' (' + memberUids.length + '/2)</div>';
        memberUids.forEach(function(uid) {
          if (!players[uid]) return;
          html += '<div class="lobby-player-row">';
          html += '<span style="font-size:13px;font-weight:600;color:var(--text)">' + players[uid].name + '</span>';
          if (isCreator) {
            html += '<button onclick="removeFromTeam(\'' + uid + '\',\'' + tk + '\')" style="background:none;border:none;color:#ff5252;font-size:18px;cursor:pointer;line-height:1;padding:0 2px">×</button>';
          }
          html += '</div>';
        });
        if (memberUids.length < 2) {
          html += '<div style="font-size:12px;color:var(--text-muted);font-style:italic;padding:4px 0">' + (2 - memberUids.length) + ' slot' + (2 - memberUids.length > 1 ? 's' : '') + ' open</div>';
        }
        html += '</div>';
      });
      html += '</div>';

      // Unassigned
      if (unassigned.length > 0) {
        html += '<div style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:14px">';
        html += '<div style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Waiting to Assign</div>';
        unassigned.forEach(function(uid) {
          if (!players[uid]) return;
          html += '<div class="lobby-player-row" style="margin-bottom:10px">';
          html += '<span style="font-size:14px;font-weight:600;color:var(--text)">' + players[uid].name + '</span>';
          if (isCreator) {
            html += '<div style="display:flex;gap:6px">';
            html += '<button onclick="assignToTeam(\'' + uid + '\',\'teamA\')" style="padding:6px 10px;background:rgba(100,181,246,0.15);border:1px solid rgba(100,181,246,0.4);border-radius:8px;color:#64b5f6;font-size:11px;font-weight:700;cursor:pointer">Team A</button>';
            html += '<button onclick="assignToTeam(\'' + uid + '\',\'teamB\')" style="padding:6px 10px;background:rgba(239,154,154,0.15);border:1px solid rgba(239,154,154,0.4);border-radius:8px;color:#ef9a9a;font-size:11px;font-weight:700;cursor:pointer">Team B</button>';
            html += '</div>';
          }
          html += '</div>';
        });
        html += '</div>';
      }

      if (isCreator) {
        var canStart = teamAuids.length === 2 && teamBuids.length === 2;
        html += '<button onclick="startScramble()" ' + (canStart ? '' : 'disabled') + ' style="width:100%;padding:16px;background:' + (canStart ? 'var(--green-accent)' : 'rgba(255,255,255,0.06)') + ';color:' + (canStart ? '#132017' : '#555') + ';font-size:16px;font-weight:800;border:none;border-radius:12px;cursor:' + (canStart ? 'pointer' : 'not-allowed') + ';margin-bottom:12px">';
        html += canStart ? '🚀 Start Round' : 'Assign all 4 players to start';
        html += '</button>';
        html += '<button onclick="leaveGroupRound()" style="width:100%;padding:12px;background:none;border:1px solid var(--border);border-radius:10px;color:var(--text-muted);font-size:13px;cursor:pointer">Cancel Round</button>';
      } else {
        html += '<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:14px">Waiting for admin to set up teams...</div>';
        html += '<div style="display:flex;justify-content:center;margin-bottom:12px"><span class="spinner" style="width:28px;height:28px;border-width:3px"></span></div>';
        html += '<button onclick="leaveGroupRound()" style="width:100%;padding:12px;background:none;border:1px solid var(--border);border-radius:10px;color:var(--text-muted);font-size:13px;cursor:pointer">Leave Round</button>';
      }

      html += '</div>';
      document.getElementById('mainContent').innerHTML = html;
    }

    function renderScrambleGame(data) {
      var course = course_ref.current;
      if (!course) return;
      var teams = data.meta.teams || { teamA: { name: '', members: [] }, teamB: { name: '', members: [] } };
      var myTeamKey = scrambleTeamKey;
      var oppTeamKey = myTeamKey === 'teamA' ? 'teamB' : 'teamA';
      var myTeam = teams[myTeamKey] || { name: '', members: [] };
      var oppTeam = teams[oppTeamKey] || { name: '', members: [] };
      var teamScores = data.teamScores || { teamA: {}, teamB: {} };
      var teamHole = data.teamHole || { teamA: 0, teamB: 0 };
      var teamHoleConfirmed = data.teamHoleConfirmed || { teamA: {}, teamB: {} };
      var myHoleIdx = teamHole[myTeamKey] || 0;
      var myConfirmed = teamHoleConfirmed[myTeamKey] || {};
      var myTeamMembers = myTeam.members || [];
      currentHole = myHoleIdx;

      var hole = course.holes[myHoleIdx];
      var myScore = (teamScores[myTeamKey] && teamScores[myTeamKey][myHoleIdx]) ? teamScores[myTeamKey][myHoleIdx] : 0;
      var oppHoleIdx = teamHole[oppTeamKey] || 0;
      var oppScore = (teamScores[oppTeamKey] && teamScores[oppTeamKey][oppHoleIdx > 0 ? oppHoleIdx - 1 : 0]) || 0;
      // Actually show opp team current hole score
      var oppCurrentScore = (teamScores[oppTeamKey] && teamScores[oppTeamKey][oppHoleIdx]) ? teamScores[oppTeamKey][oppHoleIdx] : 0;

      var myScoreClass = myScore > 0 ? getScoreClass(myScore, hole.par) : '';
      var myScoreLabel = myScore > 0 ? getScoreLabel(myScore, hole.par) : '—';
      var iConfirmed = myConfirmed[user.uid] === true;
      var isLastHole = myHoleIdx >= 17;
      var isCreator = data.meta.createdBy === user.uid;

      var myTeamName = myTeam.name || (myTeamKey === 'teamA' ? 'Team A' : 'Team B');
      var oppTeamName = oppTeam.name || (oppTeamKey === 'teamA' ? 'Team A' : 'Team B');
      var myColor = myTeamKey === 'teamA' ? '#64b5f6' : '#ef9a9a';
      var oppColor = oppTeamKey === 'teamA' ? '#64b5f6' : '#ef9a9a';

      var html = '';

      // Hole card
      html += '<div class="scramble-card">';
      html += '<div class="scramble-hole-header">';
      html += '<div class="scramble-hole-num">Hole ' + (myHoleIdx + 1) + ' &bull; Par ' + hole.par + '</div>';
      html += '<div class="scramble-hole-meta">' + (hole.yards || '—') + ' yds</div>';
      html += '</div>';

      // My team score
      html += '<div class="team-score-section mine">';
      html += '<div class="team-badge mine" style="color:' + myColor + '">🏌️ ' + myTeamName + ' &mdash; YOUR TEAM</div>';
      html += '<div class="scramble-stepper">';
      html += '<button class="scramble-step-btn" onclick="scrambleAdj(-1)">&#8722;</button>';
      html += '<div class="scramble-score-display ' + myScoreClass + '">' + (myScore || 0) + '</div>';
      html += '<button class="scramble-step-btn" onclick="scrambleAdj(1)">+</button>';
      html += '</div>';
      html += '<div class="scramble-score-label ' + myScoreClass + '">' + myScoreLabel + '</div>';
      html += '</div>';

      // Opponent score
      html += '<div class="team-score-section opp">';
      html += '<div class="team-badge opp" style="color:' + oppColor + '">' + oppTeamName + '</div>';
      html += '<div class="opp-score-row">';
      html += '<div>';
      var oppHoleScore = (teamScores[oppTeamKey] && teamScores[oppTeamKey][oppHoleIdx]) ? teamScores[oppTeamKey][oppHoleIdx] : 0;
      var oppPar = course.holes[oppHoleIdx] ? course.holes[oppHoleIdx].par : hole.par;
      var oppScoreClass = oppHoleScore > 0 ? getScoreClass(oppHoleScore, oppPar) : '';
      var oppScoreLabel = oppHoleScore > 0 ? getScoreLabel(oppHoleScore, oppPar) : 'No score yet';
      html += '<div class="opp-score-num ' + oppScoreClass + '">' + (oppHoleScore || '—') + '</div>';
      html += '<div class="opp-score-label">Hole ' + (oppHoleIdx + 1) + ' &bull; ' + oppScoreLabel + '</div>';
      html += '</div>';
      html += '</div>';
      html += '</div>';

      // Confirmation row
      html += '<div class="confirm-section">';
      html += '<div class="confirm-row">';
      myTeamMembers.forEach(function(uid) {
        var pName = (data.players && data.players[uid]) ? data.players[uid].name : uid;
        var done = myConfirmed[uid] === true;
        html += '<div class="confirm-chip ' + (done ? 'done' : 'waiting') + '">' + pName + (done ? ' ✓' : ' ...') + '</div>';
      });
      html += '</div>';

      if (isLastHole) {
        if (iConfirmed) {
          html += '<button class="scramble-confirm-btn already" disabled>Score Confirmed ✓</button>';
        } else {
          html += '<button class="scramble-confirm-btn" onclick="scrambleConfirmFinish()">Confirm & Finish Round ✓</button>';
        }
      } else {
        if (iConfirmed) {
          html += '<button class="scramble-confirm-btn already" onclick="scrambleUndoConfirm()">Confirmed — Tap to Undo</button>';
        } else {
          html += '<button class="scramble-confirm-btn" onclick="scrambleConfirmHole()" ' + (myScore <= 0 ? 'disabled' : '') + '>Confirm Score &rarr;</button>';

      }
      html += '</div>';
      html += '</div>'; // end scramble-card

      // Team leaderboard
      html += '<div class="scramble-lb">';
      html += '<div class="scramble-lb-header">🏆 Scramble Leaderboard</div>';
      [myTeamKey, oppTeamKey].forEach(function(tk) {
        var tScores = teamScores[tk] || {};
        var tHole = teamHole[tk] || 0;
        var teamTotal = 0, teamPar = 0;
        for (var h = 0; h < tHole; h++) {
          teamTotal += (tScores[h] || 0);
          teamPar += (course.holes[h] ? course.holes[h].par : 4);
        }
        var toPar = tHole > 0 ? teamTotal - teamPar : null;
        var toParStr = toPar === null ? '—' : (toPar === 0 ? 'E' : (toPar > 0 ? '+' + toPar : toPar));
        var toParColor = toPar === null ? 'var(--text-muted)' : toPar < 0 ? 'var(--green-accent)' : toPar > 0 ? 'var(--bogey)' : 'var(--par-color)';
        var tName = teams[tk] ? (teams[tk].name || (tk === 'teamA' ? 'Team A' : 'Team B')) : tk;
        var tColor = tk === 'teamA' ? '#64b5f6' : '#ef9a9a';
        var isMe = tk === myTeamKey;
        html += '<div class="scramble-lb-row" style="' + (isMe ? 'background:rgba(201,162,75,0.05)' : '') + '">';
        html += '<div style="font-size:14px;font-weight:700;color:' + tColor + '">' + tName + (isMe ? ' (You)' : '') + '</div>';
        html += '<div style="text-align:right">';
        html += '<div style="font-size:18px;font-weight:900;color:' + toParColor + '">' + toParStr + '</div>';
        html += '<div style="font-size:11px;color:var(--text-muted)">Thru ' + tHole + '</div>';
        html += '</div>';
        html += '</div>';
      });
      html += '</div>';

      // Admin controls
      if (isCreator) {
        html += '<div style="margin-bottom:80px">';
        html += '<button onclick="scrambleEndForAll()" style="width:100%;padding:12px;background:none;border:1px solid rgba(255,82,82,0.3);border-radius:10px;color:#ff5252;font-size:13px;cursor:pointer">End Round for All</button>';
        html += '</div>';
      } else {
        html += '<div style="margin-bottom:80px"></div>';
      }

      document.getElementById('mainContent').innerHTML = html;
    }

    function renderScrambleNameModal(teamKey) {
      var existing = document.getElementById('teamNameModal');
      if (existing) return;
      var modal = document.createElement('div');
      modal.id = 'teamNameModal';
      modal.className = 'team-name-modal';
      modal.innerHTML =
        '<div class="team-name-box">' +
          '<div style="font-size:40px;margin-bottom:12px">🏆</div>' +
          '<h3 style="font-size:18px;color:var(--text);margin-bottom:6px">Name Your Team</h3>' +
          '<p style="font-size:13px;color:var(--text-muted);margin-bottom:20px">First player to submit sets the name — choose wisely!</p>' +
          '<input type="text" id="teamNameInput" placeholder="Team name..." maxlength="20" style="width:100%;padding:12px;background:var(--bg);border:1px solid var(--border-light);border-radius:10px;color:var(--text);font-size:18px;font-weight:700;text-align:center;margin-bottom:12px" autocomplete="off">' +
          '<button onclick="submitTeamName(\'' + teamKey + '\')" style="width:100%;padding:14px;background:var(--green-accent);color:#132017;font-size:15px;font-weight:800;border:none;border-radius:10px;cursor:pointer">Set Team Name</button>' +
        '</div>';

    window.assignToTeam = function(uid, teamKey) {
      var base = 'activeRounds/' + groupCode + '/meta/teams/' + teamKey;
      db.ref(base + '/members').once('value').then(function(snap) {
        var members = snap.val() || [];
        if (members.indexOf(uid) >= 0) return;

        members.push(uid);
        return db.ref(base + '/members').set(members);
      }).catch(function() {});
    };

    window.removeFromTeam = function(uid, teamKey) {
      var base = 'activeRounds/' + groupCode + '/meta/teams/' + teamKey;
      db.ref(base + '/members').once('value').then(function(snap) {
        var members = (snap.val() || []).filter(function(u) { return u !== uid; });
        return db.ref(base + '/members').set(members);
      }).catch(function() {});
    };

    window.startScramble = function() {
      startScrambleRound(groupCode).catch(function(e) { alert('Could not start round.'); });
    };

    window.scrambleAdj = function(delta) {
      if (!scrambleTeamKey) return;
      var data = window._lastScrambleData;
      if (!data) return;
      var teamScores = data.teamScores || {};
      var teamHole = data.teamHole || {};
      var holeIdx = teamHole[scrambleTeamKey] || 0;
      var cur = (teamScores[scrambleTeamKey] && teamScores[scrambleTeamKey][holeIdx]) || 0;
      var next = Math.max(0, Math.min(20, cur + delta));
      if (next === cur) return;
      // Reset confirmations when score changes
      resetScrambleConfirmations(groupCode, scrambleTeamKey).catch(function() {});
      updateScrambleScore(groupCode, scrambleTeamKey, holeIdx, next).catch(function() {});
    };

    window.scrambleConfirmHole = function() {
      if (!scrambleTeamKey) return;
      var data = window._lastScrambleData;
      if (!data) return;
      var teams = data.meta.teams || {};
      var myTeam = teams[scrambleTeamKey] || {};
      var allMembers = myTeam.members || [];
      var teamHole = data.teamHole || {};
      var holeIdx = teamHole[scrambleTeamKey] || 0;
      var teamScores = data.teamScores || {};
      var myScore = (teamScores[scrambleTeamKey] && teamScores[scrambleTeamKey][holeIdx]) || 0;
      var course = course_ref.current;
      var holePar = course ? course.holes[holeIdx].par : 4;

      // Show score effect
      showScoreEffect(myScore, holePar, function() {});
      confirmScrambleHole(groupCode, scrambleTeamKey, user.uid, allMembers).catch(function() {});

    window.scrambleUndoConfirm = function() {

    window.scrambleConfirmFinish = function() {
      if (!scrambleTeamKey) return;
      var data = window._lastScrambleData;
      if (!data) return;
      if (!confirm('Confirm your team\'s final score and finish the round?')) return;
      var teams = data.meta.teams || {};
      var allMembers = (teams[scrambleTeamKey] || {}).members || [];
      confirmScrambleHole(groupCode, scrambleTeamKey, user.uid, allMembers).then(function() {
        // Check if both teams are on hole 17 (index) and confirmed
        saveScrambleRound(data);
        markPlayerFinished(groupCode, user.uid).catch(function() {});
        if (unsubscribe) unsubscribe();
        if (unsubConn) unsubConn();
        localStorage.removeItem('active-group-code');
        window.location.href = 'live-game.html?group=' + groupCode;

    window.scrambleEndForAll = function() {

      roundEndedHandled = true;

    function saveScrambleRound(data) {
      var course = course_ref.current;
      if (!course) return;
      var teams = data.meta.teams || {};
      var teamScores = data.teamScores || {};
      var teamHole = data.teamHole || {};
      var round = {
        id: Date.now().toString(),
        courseId: course.id,
        courseName: course.name,
        tee: data.meta.tee,
        teeLabel: data.meta.teeLabel,
        par: course.par,
        date: data.meta.date,
        gameType: 'scramble',
        groupCode: groupCode,
        players: Object.keys(data.players || {}).map(function(u) { return data.players[u].name; }),
        scores: {}, // empty — scramble uses teamScores
        tracking: {},
        holePars: course.holes.map(function(h) { return h.par; }),
        teamScores: JSON.parse(JSON.stringify(teamScores)),
        teams: JSON.parse(JSON.stringify(teams))
      };
      fbSaveRound(user.uid, round).catch(function() {});
      var rounds = loadRounds();
      var exists = false;
      for (var i = rounds.length - 1; i >= 0; i--) {
        if (rounds[i].groupCode === groupCode && rounds[i].gameType === 'scramble') {
          round.id = rounds[i].id;
          rounds[i] = round;
          exists = true;
          break;
        }
      }
      if (!exists) rounds.push(round);
      saveRounds(rounds);
    }

    // Store latest scramble data for interaction handlers
    var _origHandleScramble = handleScrambleData;
    handleScrambleData = function(data) {
      window._lastScrambleData = data;
      _origHandleScramble(data);
    };

    // Determine the current playable hole for the current user (respects starting hole wrap-around)
    function getGroupPlayableHole() {
      const myName = R._uidToName[user.uid];
      if (!myName) return 0;
      const course = course_ref.current;
      if (!course) return 0;
      const start = R._startingHole || 0;
      for (let j = 0; j < 18; j++) {
        const i = (start + j) % 18;
        if (!(R.scores[myName][i] > 0)) return i;
      }
      // All scored — return last hole in play order
      return (start + 17) % 18;
    }

    // Build the players leaderboard HTML
    function buildPlayersLeaderboard(roundData, course, myName) {
      let lhtml = '<div id="playersLeaderboard" style="background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:12px;overflow:hidden">';
      lhtml += '<div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">';
      lhtml += '<span style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted)">Players</span>';
      lhtml += '<span style="font-size:11px;color:var(--green-accent)">&#9679; Live</span>';
      lhtml += '</div>';

      const sorted = roundData.players.slice().sort(function(a, b) {
        if (a === myName) return -1;
        if (b === myName) return 1;
        const aPlayed = roundData.scores[a].filter(s => s > 0).length;
        const bPlayed = roundData.scores[b].filter(s => s > 0).length;
        if (aPlayed === 0 && bPlayed === 0) return 0;
        if (aPlayed === 0) return 1;
        if (bPlayed === 0) return -1;
        const aDiff = roundData.scores[a].reduce((s, v) => s + v, 0) - course.holes.filter((h, i) => roundData.scores[a][i] > 0).reduce((a2, h) => a2 + h.par, 0);
        const bDiff = roundData.scores[b].reduce((s, v) => s + v, 0) - course.holes.filter((h, i) => roundData.scores[b][i] > 0).reduce((a2, h) => a2 + h.par, 0);
        return aDiff - bDiff;
      });

      sorted.forEach(function(p, idx) {
        const isMe = p === myName;
        const isAdmin = roundData._nameToUid && roundData._nameToUid[p] === roundData._createdBy;
        const scores = roundData.scores[p];
        const totalScore = scores.reduce((s, v) => s + v, 0);
        const holesPlayed = scores.filter(s => s > 0).length;
        const parPlayed = course.holes.filter((h, i) => scores[i] > 0).reduce((a, h) => a + h.par, 0);
        const diff = totalScore - parPlayed;
        let toPar = 'E';
        let toParColor = 'var(--text-muted)';
        if (holesPlayed === 0) { toPar = '\u2014'; }
        else if (diff < 0) { toPar = diff.toString(); toParColor = 'var(--green-accent)'; }
        else if (diff > 0) { toPar = '+' + diff; toParColor = 'var(--bogey)'; }

        const borderTop = idx > 0 ? 'border-top:1px solid var(--border);' : '';
        const meBg = isMe ? 'background:rgba(201,162,75,0.04);' : '';

        lhtml += '<div style="padding:10px 14px;display:flex;align-items:center;justify-content:space-between;' + borderTop + meBg + '">';
        lhtml += '<div style="display:flex;align-items:center;gap:10px;min-width:0;flex:1">';
        var pAvatar = playerAvatarByName(p, roundData._nameToUid, 26);
        if (pAvatar) {
          lhtml += pAvatar;
        } else if (isMe) {
          lhtml += '<div style="width:26px;height:26px;border-radius:50%;background:var(--green-accent);color:#000;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0">YOU</div>';
        } else {
          lhtml += '<div style="width:26px;height:26px;border-radius:50%;background:var(--bg-elevated);color:var(--text-muted);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;border:1px solid var(--border)">' + p.charAt(0).toUpperCase() + '</div>';
        }
        lhtml += '<span style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + styledName(p) + '</span>';
        if (isAdmin) {
          lhtml += '<span style="font-size:9px;font-weight:700;color:#f5a623;background:rgba(245,166,35,0.15);padding:2px 6px;border-radius:4px;letter-spacing:0.5px;flex-shrink:0">&#9733; HOST</span>';
        }
        lhtml += '</div>';
        lhtml += '<div style="display:flex;align-items:center;gap:12px;flex-shrink:0">';
        lhtml += '<span style="font-size:11px;color:var(--text-muted)">' + (holesPlayed > 0 ? 'Thru ' + holesPlayed : '\u2014') + '</span>';
        lhtml += '<span style="font-size:16px;font-weight:800;min-width:28px;text-align:right">' + (holesPlayed > 0 ? totalScore : '\u2014') + '</span>';
        lhtml += '<span style="font-size:13px;font-weight:700;min-width:32px;text-align:right;color:' + toParColor + '">' + toPar + '</span>';
        lhtml += '</div>';
        lhtml += '</div>';
      });

      lhtml += '</div>';
      return lhtml;
    }

    // Update only the players leaderboard without re-rendering the whole page
    function updatePlayersLeaderboard() {
      if (!R || !course_ref.current) return;
