<!DOCTYPE html>
<html lang="en">
<head>
<style>html,body{background:#0a0f0d}</style>
<script>
(function(){var v='165';var k='app_v';var s=localStorage.getItem(k);if(s&&s!==v){localStorage.setItem(k,v);window.location.replace(window.location.pathname+'?_='+Date.now());return;}localStorage.setItem(k,v);})();
</script>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0f0d">

<title>My Stats - Westchester Golf</title>

</head>
<body>

<div class="header">
  <h1>My Stats</h1>
  <div class="subtitle" id="playerName"></div>
</div>

<div id="broadcastBanner"></div>
<div id="activeRoundBanner"></div>

<div class="main">
  <div class="stat-grid" id="statGrid"></div>
  <div id="chartSection"></div>
  <div id="tipsSection"></div>
  <div id="courseStatsSection">
    <div class="waiting-players"><span class="spinner"></span> Loading stats...</div>
  </div>
</div>

<nav class="bottom-nav" id="bottomNav"></nav>

<script src="firebase-config.js?v=165"></script>
<script src="shared.js?v=165"></script>
<script src="firebase-sync.js?v=165"></script>
<script>
  requireAuth(function(user) {
    renderBottomNav('personal');
    renderActiveRoundBanner();
    renderBroadcastBanner();

    var displayName = user.displayName || 'You';
    document.getElementById('playerName').textContent = displayName + "'s personal stats";

    // Show localStorage data immediately (instant render), then update from Firebase
    var localRounds = loadRounds();
    if (localRounds.length) {
      renderPersonalStats(localRounds, displayName);
    }

    // Wait for Firebase SDK to be fully loaded, then fetch rounds
    _firebaseLoadPromise.then(function() {
      return fbLoadRounds(user.uid);
    }).then(function(fbRounds) {
      if (fbRounds.length) {
        // Sync localStorage to match Firebase
        saveRounds(fbRounds);
        renderPersonalStats(fbRounds, displayName);
      } else if (!localRounds.length) {
        // Both empty — show empty state
        renderPersonalStats([], displayName);
      }
    }).catch(function() {
      // Firebase failed — localStorage data already shown above
      if (!localRounds.length) {
        renderPersonalStats([], displayName);
      }
    });

    // Helper: find my player name in a round
    // Tries exact match, case-insensitive match, then falls back to
    // first player (since fbLoadRounds only returns rounds owned by this uid,
    // every round belongs to the current user — their name may have changed)
    function findMe(r, myName) {
      if (!r.players || !r.players.length) return null;
      var me = r.players.find(function(p) { return p === myName; });
      if (me) return me;
      me = r.players.find(function(p) { return p.toLowerCase() === myName.toLowerCase(); });
      if (me) return me;
      // Fallback: if this is a solo round (1 player), it must be me
      if (r.players.length === 1) return r.players[0];
      // For group rounds, check if any player name matches any known past username
      // Last resort: return null (skip this round)
      return null;
    }

    function renderPersonalStats(rounds, myName) {
      if (!rounds.length) {
        document.getElementById('statGrid').innerHTML = '';
        document.getElementById('tipsSection').innerHTML = '';
        document.getElementById('courseStatsSection').innerHTML = '<div class="empty-state"><div class="icon">&#128100;</div><p>No rounds yet.<br><a href="index.html">Play a round</a> to see your personal stats.</p></div>';
        return;
      }

      // Find my stats across all rounds
      var myRounds = 0, myTotalScore = 0, myBest = Infinity, coursesPlayed = new Set();

      rounds.forEach(function(r) {
        var me = findMe(r, myName);
        if (!me) return;

        var scores = r.scores[me];
        if (!scores) return;
        var total = scores.reduce(function(a, b) { return a + b; }, 0);
        var played = scores.filter(function(s) { return s > 0; }).length;

        if (total > 0 && played >= 9) {
          myRounds++;
          myTotalScore += total;
          if (total < myBest) myBest = total;
          if (r.courseId) coursesPlayed.add(r.courseId);
        }
      });

      var myAvg = myRounds > 0 ? (myTotalScore / myRounds).toFixed(1) : '-';

      // Calculate tracking stats: fairway %, GIR %, avg putts, handicap estimate
      var totalFwHit = 0, totalFwChances = 0, totalGirHit = 0, totalGirChances = 0;
      var totalPutts = 0, totalPuttHoles = 0;

      rounds.forEach(function(r) {
        var me = findMe(r, myName);
        if (!me || !r.scores[me] || !r.tracking || !r.tracking[me]) return;
        var scores = r.scores[me];
        var t = r.tracking[me];
        var played = scores.filter(function(s) { return s > 0; }).length;
        if (played < 9) return;

        for (var i = 0; i < 18; i++) {
          if (scores[i] > 0) {
            // Fairway: only count par 4+ holes
            var holePar = (r.holePars && r.holePars[i]) ? r.holePars[i] : 4;
            if (holePar >= 4) {
              totalFwChances++;
              if (t.fairway && t.fairway[i]) totalFwHit++;
            }
            // GIR
            totalGirChances++;
            if (t.gir && t.gir[i]) totalGirHit++;
            // Putts
            if (t.putts && t.putts[i] > 0) {
              totalPutts += t.putts[i];
              totalPuttHoles++;
            }
          }
        }
      });

      var fwRate = totalFwChances > 0 ? Math.round((totalFwHit / totalFwChances) * 100) + '%' : '-';
      var girRate = totalGirChances > 0 ? Math.round((totalGirHit / totalGirChances) * 100) + '%' : '-';
      var avgPutts = totalPuttHoles > 0 ? (totalPutts / totalPuttHoles).toFixed(1) : '-';

      // Handicap estimate: average of (score - par) * 0.96, simplified
      var handicap = '-';
      if (myRounds > 0) {
        var diffs = [];
        rounds.forEach(function(r) {
          var me = findMe(r, myName);
          if (!me || !r.scores[me]) return;
          var total = r.scores[me].reduce(function(a, b) { return a + b; }, 0);
          var played = r.scores[me].filter(function(s) { return s > 0; }).length;
          if (total > 0 && played >= 9) {
            var par = r.par || 72;
            diffs.push(total - par);
          }
        });
        if (diffs.length > 0) {
          // Use best 8 of last 20 differentials (simplified handicap formula)
          diffs.sort(function(a, b) { return a - b; });
          var useCount = Math.max(1, Math.min(8, Math.ceil(diffs.length * 0.4)));
          var bestDiffs = diffs.slice(0, useCount);
          var avgDiff = bestDiffs.reduce(function(a, b) { return a + b; }, 0) / bestDiffs.length;
          handicap = Math.max(0, avgDiff * 0.96).toFixed(1);
        }
      }

      document.getElementById('statGrid').innerHTML =
        '<div class="stat-box"><div class="stat-value">' + myRounds + '</div><div class="stat-label">Rounds</div></div>' +
        '<div class="stat-box"><div class="stat-value">' + (myBest < Infinity ? myBest : '-') + '</div><div class="stat-label">Best Score</div></div>' +
        '<div class="stat-box"><div class="stat-value">' + myAvg + '</div><div class="stat-label">Avg Score</div></div>' +
        '<div class="stat-box"><div class="stat-value">' + handicap + '</div><div class="stat-label">Handicap</div></div>' +
        '<div class="stat-box"><div class="stat-value">' + avgPutts + '</div><div class="stat-label">Avg Putts</div></div>' +
        '<div class="stat-box"><div class="stat-value">' + coursesPlayed.size + '</div><div class="stat-label">Courses</div></div>';

      // Score performance chart
      renderScoreChart(rounds, myName);

      // Tips & insights
      renderTips(rounds, myName);

      // Per-course breakdown — only my scores
      var courseHtml = '<div class="section-title" style="margin-top:8px">By Course</div>';
      var any = false;

      COURSES.forEach(function(c) {
        var courseRounds = rounds.filter(function(r) { return r.courseId === c.id; });
        if (!courseRounds.length) return;

        var myCourseBest = Infinity, myCourseTotal = 0, myCourseRounds = 0;

        courseRounds.forEach(function(r) {
          var me = findMe(r, myName);
          if (!me || !r.scores[me]) return;

          var total = r.scores[me].reduce(function(a, b) { return a + b; }, 0);
          var played = r.scores[me].filter(function(s) { return s > 0; }).length;

          if (total > 0 && played >= 9) {
            myCourseRounds++;
            myCourseTotal += total;
            if (total < myCourseBest) myCourseBest = total;
          }
        });

        if (myCourseRounds === 0) return;
        any = true;

        var myCourseAvg = (myCourseTotal / myCourseRounds).toFixed(0);

        courseHtml +=
          '<div class="history-card">' +
            '<h3>' + c.name + '</h3>' +
            '<div style="display:flex;gap:16px;font-size:12px;color:var(--text-muted);margin-top:4px">' +
              '<span>' + myCourseRounds + ' round' + (myCourseRounds > 1 ? 's' : '') + '</span>' +
              '<span>Par ' + c.par + '</span>' +
            '</div>' +
            '<div class="history-scores" style="margin-top:8px">' +
              '<div class="history-score-row">' +
                '<span>Best</span>' +
                '<span><strong>' + myCourseBest + '</strong></span>' +
              '</div>' +
              '<div class="history-score-row">' +
                '<span>Average</span>' +
                '<span>' + myCourseAvg + '</span>' +
              '</div>' +
            '</div>' +
          '</div>';
      });

      document.getElementById('courseStatsSection').innerHTML = any ? courseHtml : '<div style="text-align:center;color:var(--text-muted);font-size:13px;margin-top:16px">Play a full round (9+ holes) to see course stats.</div>';
    }

    function renderScoreChart(rounds, myName) {
      var container = document.getElementById('chartSection');

      // Collect data points: { date, score, courseName, par }
      var points = [];
      rounds.forEach(function(r) {
        var me = findMe(r, myName);
        if (!me || !r.scores[me]) return;
        var total = r.scores[me].reduce(function(a, b) { return a + b; }, 0);
        var played = r.scores[me].filter(function(s) { return s > 0; }).length;
        if (total > 0 && played >= 9) {
          points.push({
            date: new Date(r.date),
            score: total,
            courseName: r.courseName || 'Unknown',
            par: r.par || 72
          });
        }
      });

      // Sort by date
      points.sort(function(a, b) { return a.date - b.date; });

      if (points.length < 2) {
        container.innerHTML = '<div style="text-align:center;color:var(--text-muted);font-size:13px;margin:16px 0">Play 2+ rounds to see your performance graph.</div>';
        return;
      }

      // Build chart HTML
      container.innerHTML =
        '<div class="section-title" style="margin-top:8px">Score Trend</div>' +
        '<div style="background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius-md);padding:16px 8px 8px;margin-bottom:16px">' +
          '<canvas id="scoreChart" style="width:100%;height:220px"></canvas>' +
        '</div>';

      var canvas = document.getElementById('scoreChart');
      var dpr = window.devicePixelRatio || 1;
      var rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      var ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      var W = rect.width;
      var H = rect.height;

      // Chart margins
      var ml = 40, mr = 16, mt = 16, mb = 40;
      var cw = W - ml - mr;
      var ch = H - mt - mb;

      // Score range — inverted: 0 at top, max at bottom (lower = better in golf)
      var scores = points.map(function(p) { return p.score; });
      var maxS = Math.max.apply(null, scores);
      var pad = Math.max(3, Math.round(maxS * 0.05));
      var yMin = 55;
      var yMax = maxS + pad;

      // Helpers — inverted Y: low scores at top, high scores at bottom
      function xPos(i) { return ml + (i / (points.length - 1)) * cw; }
      function yPos(s) { return mt + ((s - yMin) / (yMax - yMin)) * ch; }

      // Draw grid lines
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 1;
      var gridSteps = 5;
      for (var g = 0; g <= gridSteps; g++) {
        var gy = mt + (g / gridSteps) * ch;
        ctx.beginPath();
        ctx.moveTo(ml, gy);
        ctx.lineTo(ml + cw, gy);
        ctx.stroke();

        // Y-axis labels — 0 at top, max at bottom
        var label = Math.round(yMin + (g / gridSteps) * (yMax - yMin));
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.font = '10px -apple-system, sans-serif';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        ctx.fillText(label, ml - 6, gy);
      }

      // Draw score line
      ctx.strokeStyle = '#00e676';
      ctx.lineWidth = 2;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.beginPath();
      for (var i = 0; i < points.length; i++) {
        var px = xPos(i);
        var py = yPos(points[i].score);
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.stroke();

      // Draw area fill under line
      ctx.beginPath();
      ctx.moveTo(xPos(0), yPos(points[0].score));
      for (var i = 1; i < points.length; i++) {
        ctx.lineTo(xPos(i), yPos(points[i].score));
      }
      ctx.lineTo(xPos(points.length - 1), mt + ch);
      ctx.lineTo(xPos(0), mt + ch);
      ctx.closePath();
      ctx.fillStyle = 'rgba(0,230,118,0.08)';
      ctx.fill();

      // Draw dots
      for (var i = 0; i < points.length; i++) {
        var px = xPos(i);
        var py = yPos(points[i].score);
        ctx.beginPath();
        ctx.arc(px, py, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#00e676';
        ctx.fill();
        ctx.strokeStyle = '#1a1f2e';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Score label above dot
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = 'bold 10px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(points[i].score, px, py - 8);
      }

      // Linear regression trend line
      var n = points.length;
      var sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
      for (var i = 0; i < n; i++) {
        sumX += i;
        sumY += points[i].score;
        sumXY += i * points[i].score;
        sumXX += i * i;
      }
      var slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
      var intercept = (sumY - slope * sumX) / n;

      var trendStart = intercept;
      var trendEnd = slope * (n - 1) + intercept;

      ctx.strokeStyle = '#f5a623';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.moveTo(xPos(0), yPos(trendStart));
      ctx.lineTo(xPos(n - 1), yPos(trendEnd));
      ctx.stroke();
      ctx.setLineDash([]);

      // X-axis date labels
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.font = '9px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';

      // Show first, last, and middle date labels (avoid overlapping)
      var labelIndices = [0, points.length - 1];
      if (points.length > 4) labelIndices.splice(1, 0, Math.floor(points.length / 2));

      labelIndices.forEach(function(idx) {
        var d = points[idx].date;
        var dateStr = (d.getMonth() + 1) + '/' + d.getDate();
        ctx.fillText(dateStr, xPos(idx), mt + ch + 8);
      });

      // Legend
      ctx.fillStyle = 'rgba(255,255,255,0.35)';  // keep existing
      ctx.font = '9px -apple-system, sans-serif';
      ctx.textAlign = 'left';

      // Green line = Score
      ctx.strokeStyle = '#00e676';
      ctx.lineWidth = 2;
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(ml + 4, mt + ch + 26);
      ctx.lineTo(ml + 20, mt + ch + 26);
      ctx.stroke();
      ctx.fillText('Score', ml + 24, mt + ch + 23);

      // Gold dashed = Trend
      ctx.strokeStyle = '#f5a623';
      ctx.setLineDash([4, 3]);
      ctx.beginPath();
      ctx.moveTo(ml + 66, mt + ch + 26);
      ctx.lineTo(ml + 82, mt + ch + 26);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillText('Trend', ml + 86, mt + ch + 23);

      // Trend direction label
      var trendDir = slope < -0.3 ? 'Improving' : slope > 0.3 ? 'Declining' : 'Steady';
      var trendColor = slope < -0.3 ? '#00e676' : slope > 0.3 ? '#ff5252' : '#f5a623';
      ctx.fillStyle = trendColor;
      ctx.font = 'bold 10px -apple-system, sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(trendDir, ml + cw, mt + ch + 23);
    }

    function renderTips(rounds, myName) {
      var container = document.getElementById('tipsSection');
      if (!container) return;

      // Aggregate tracking data across all valid rounds
      var validRounds = 0;
      var totalMulligans = 0, mulliganTee = 0, mulliganFairway = 0, mulliganGreen = 0;
      var totalPenalties = 0, penaltyWater = 0, penaltyOB = 0, penaltyLateral = 0, penaltyUnplayable = 0;
      var totalPutts = 0, totalPuttHoles = 0, threePutts = 0;
      var totalGIR = 0, totalGIRChances = 0;
      var par3Diffs = [], par4Diffs = [], par5Diffs = [];
      var holeScoreVsPar = new Array(18).fill(0);
      var holeCounts = new Array(18).fill(0);
      var front9Totals = [], back9Totals = [];

      rounds.forEach(function(r) {
        var me = findMe(r, myName);
        if (!me || !r.scores[me]) return;
        var scores = r.scores[me];
        var played = scores.filter(function(s) { return s > 0; }).length;
        if (played < 9) return;
        validRounds++;

        var t = (r.tracking && r.tracking[me]) ? r.tracking[me] : null;

        // Front/back 9 totals
        var f9 = 0, f9c = 0, b9 = 0, b9c = 0;

        for (var i = 0; i < 18; i++) {
          if (scores[i] <= 0) continue;
          var holePar = (r.holePars && r.holePars[i]) ? r.holePars[i] : 4;
          var diff = scores[i] - holePar;

          holeScoreVsPar[i] += diff;
          holeCounts[i]++;

          if (holePar === 3) par3Diffs.push(diff);
          else if (holePar === 4) par4Diffs.push(diff);
          else if (holePar === 5) par5Diffs.push(diff);

          if (i < 9) { f9 += scores[i]; f9c++; }
          else { b9 += scores[i]; b9c++; }

          if (t) {
            // Mulligans
            var mCount = (t.mulligans && t.mulligans[i]) ? t.mulligans[i] : 0;
            if (mCount > 0) {
              totalMulligans += mCount;
              var mLocs = t.mulliganLocations && t.mulliganLocations[i];
              if (mLocs && Array.isArray(mLocs)) {
                mLocs.forEach(function(loc) {
                  if (loc === 'tee') mulliganTee++;
                  else if (loc === 'fairway') mulliganFairway++;
                  else if (loc === 'green') mulliganGreen++;
                });
              }
            }

            // Penalties / drops
            var pCount = (t.penalties && t.penalties[i]) ? t.penalties[i] : 0;
            if (pCount > 0) {
              totalPenalties += pCount;
              var pLocs = t.penaltyLocations && t.penaltyLocations[i];
              if (pLocs && Array.isArray(pLocs)) {
                pLocs.forEach(function(loc) {
                  if (loc === 'water') penaltyWater++;
                  else if (loc === 'ob') penaltyOB++;
                  else if (loc === 'lateral') penaltyLateral++;
                  else if (loc === 'unplayable') penaltyUnplayable++;
                });
              }
            }

            // Putts
            if (t.putts && t.putts[i] > 0) {
              totalPutts += t.putts[i];
              totalPuttHoles++;
              if (t.putts[i] >= 3) threePutts++;
            }

            // GIR
            totalGIRChances++;
            if (t.gir && t.gir[i]) totalGIR++;
          }
        }

        if (f9c >= 7) front9Totals.push(f9);
        if (b9c >= 7) back9Totals.push(b9);
      });

      if (validRounds === 0) { container.innerHTML = ''; return; }

      var tips = [];

      // --- Mulligan tip ---
      if (totalMulligans > 0) {
        var avgM = (totalMulligans / validRounds).toFixed(1);
        var maxMLoc = Math.max(mulliganTee, mulliganFairway, mulliganGreen);
        var topMLoc = maxMLoc === mulliganTee ? 'off the tee' :
                      maxMLoc === mulliganFairway ? 'from the fairway' :
                      maxMLoc === mulliganGreen ? 'on the green' : '';
        var mAdvice = topMLoc === 'off the tee' ? 'Build a consistent pre-shot routine to improve tee shots and reduce do-overs.' :
                      topMLoc === 'from the fairway' ? 'Focus on ball-striking from the fairway — take one more club and swing at 80%.' :
                      topMLoc === 'on the green' ? 'Practice lag putting so you leave yourself tap-ins instead of taking do-overs.' :
                      'Cutting mulligans is the fastest way to lower your score.';
        tips.push({ icon: '🔄', title: 'Mulligan Tendency',
          text: 'You average ' + avgM + ' mulligan' + (parseFloat(avgM) !== 1 ? 's' : '') + ' per round' + (topMLoc ? ', most taken ' + topMLoc : '') + '.',
          advice: mAdvice, priority: totalMulligans * 1.5 });
      }

      // --- Drop/penalty tip ---
      if (totalPenalties > 0) {
        var avgP = (totalPenalties / validRounds).toFixed(1);
        var maxPLoc = Math.max(penaltyWater, penaltyOB, penaltyLateral, penaltyUnplayable);
        var topPType = maxPLoc === penaltyWater ? 'water hazards' :
                       maxPLoc === penaltyOB ? 'OB shots' :
                       maxPLoc === penaltyLateral ? 'lateral hazards' :
                       maxPLoc === penaltyUnplayable ? 'unplayable lies' : '';
        var pAdvice = topPType === 'water hazards' ? 'Lay up short of water on long carries. A safe bogey beats a penalty double.' :
                      topPType === 'OB shots' ? 'Favor the safe side of tight holes off the tee — an iron in play beats a driver OB every time.' :
                      topPType === 'unplayable lies' ? 'When in trouble, punch out sideways. Hero shots from unplayable lies rarely pay off.' :
                      'Playing smarter off the tee reduces costly penalty strokes.';
        tips.push({ icon: '🫳', title: 'Penalty Drops',
          text: 'You average ' + avgP + ' drop' + (parseFloat(avgP) !== 1 ? 's' : '') + ' per round' + (topPType ? ', mostly from ' + topPType : '') + '.',
          advice: pAdvice, priority: totalPenalties * 2 });
      }

      // --- Putting tip ---
      if (totalPuttHoles > 0) {
        var avgPutts = totalPutts / totalPuttHoles;
        var threePuttPct = Math.round(threePutts / totalPuttHoles * 100);
        if (avgPutts > 2.1) {
          tips.push({ icon: '⛳', title: 'Putting is Costing You',
            text: 'You average ' + avgPutts.toFixed(2) + ' putts per hole, and 3-putt ' + threePuttPct + '% of the time.',
            advice: 'Work on lag putting — rolling long putts within 3 feet will eliminate most of your 3-putts.',
            priority: (avgPutts - 2.0) * 25 });
        } else if (avgPutts < 1.85) {
          tips.push({ icon: '⛳', title: 'Elite Putter',
            text: 'You average just ' + avgPutts.toFixed(2) + ' putts per hole — your putter is a weapon.',
            advice: 'Hit more greens in regulation to fully capitalize on your putting ability.',
            priority: 1 });
        } else if (threePuttPct > 15) {
          tips.push({ icon: '⛳', title: '3-Putts Adding Up',
            text: 'You 3-putt ' + threePuttPct + '% of the time, which is costing you strokes.',
            advice: 'Focus on speed control from long range — getting the ball close from 30+ feet is more valuable than line.',
            priority: threePuttPct * 0.4 });
        }
      }

      // --- Front 9 vs Back 9 ---
      if (front9Totals.length >= 2 && back9Totals.length >= 2) {
        var f9Avg = front9Totals.reduce(function(a,b){return a+b;},0) / front9Totals.length;
        var b9Avg = back9Totals.reduce(function(a,b){return a+b;},0) / back9Totals.length;
        var halfDiff = Math.abs(f9Avg - b9Avg);
        if (halfDiff >= 2) {
          var stronger = f9Avg < b9Avg ? 'front 9' : 'back 9';
          var weaker = stronger === 'front 9' ? 'back 9' : 'front 9';
          var fAdvice = stronger === 'front 9'
            ? 'You tend to fade after the turn — stay hydrated, keep your pre-shot routine, and treat the back 9 like a fresh round.'
            : 'You start slowly but finish strong — try bringing that back-9 energy and focus to your very first holes.';
          tips.push({ icon: '📊', title: 'Front vs Back 9',
            text: 'Your ' + stronger + ' averages ' + halfDiff.toFixed(1) + ' fewer strokes than your ' + weaker + '.',
            advice: fAdvice, priority: halfDiff * 1.5 });
        }
      }

      // --- Par type tips ---
      function parAvg(arr) { return arr.length ? arr.reduce(function(a,b){return a+b;},0)/arr.length : null; }
      var p3avg = parAvg(par3Diffs), p4avg = parAvg(par4Diffs), p5avg = parAvg(par5Diffs);
      var parTypes = [];
      if (p3avg !== null) parTypes.push({ label: 'Par 3s', avg: p3avg, type: 3 });
      if (p4avg !== null) parTypes.push({ label: 'Par 4s', avg: p4avg, type: 4 });
      if (p5avg !== null) parTypes.push({ label: 'Par 5s', avg: p5avg, type: 5 });

      if (parTypes.length > 0) {
        parTypes.sort(function(a,b){ return b.avg - a.avg; });
        var worst = parTypes[0];
        if (worst.avg > 1.8) {
          var ptAdvice = worst.type === 3 ? 'Par 3s are all about iron accuracy — pick a specific target and commit. Miss toward the fat part of the green.' :
                         worst.type === 4 ? 'Par 4s set the tone for your round — prioritize fairways over distance off the tee.' :
                         'Par 5s are scoring holes — get to the green in 3 and you\'ll always have a putt for birdie.';
          tips.push({ icon: '⚠️', title: worst.label + ' Struggles',
            text: 'You average +' + worst.avg.toFixed(1) + ' on ' + worst.label.toLowerCase() + ', your toughest hole type.',
            advice: ptAdvice, priority: worst.avg * 3 });
        }
        var best = parTypes[parTypes.length - 1];
        if (best.avg < 1.2 && best.label !== worst.label) {
          tips.push({ icon: '💪', title: best.label + ' Strength',
            text: 'You average +' + best.avg.toFixed(1) + ' on ' + best.label.toLowerCase() + ' — your strongest hole type.',
            advice: 'Use your strength on ' + best.label.toLowerCase() + ' to build momentum heading into tougher holes.',
            priority: 1 });
        }
      }

      // --- Worst holes ---
      var worstHoles = [];
      for (var i = 0; i < 18; i++) {
        if (holeCounts[i] >= 2) {
          var ha = holeScoreVsPar[i] / holeCounts[i];
          if (ha > 1.5) worstHoles.push({ hole: i + 1, avg: ha });
        }
      }
      if (worstHoles.length > 0) {
        worstHoles.sort(function(a,b){ return b.avg - a.avg; });
        var top = worstHoles.slice(0, 3);
        var hStr = top.map(function(h){ return '#' + h.hole + ' (+' + h.avg.toFixed(1) + ')'; }).join(', ');
        tips.push({ icon: '🔥', title: 'Consistent Trouble Holes',
          text: 'Hole' + (top.length > 1 ? 's ' : ' ') + hStr + ' give you the most trouble on average.',
          advice: 'On these holes, set your goal at bogey. A smart bogey beats a scrambling double any day.',
          priority: worstHoles[0].avg * 3.5 });
      }

      if (tips.length === 0) { container.innerHTML = ''; return; }

      // Sort by priority, cap at 5
      tips.sort(function(a,b){ return b.priority - a.priority; });
      var show = tips.slice(0, 5);

      var html = '<div class="section-title" style="margin-top:8px">Tips & Insights</div>';
      show.forEach(function(tip) {
        html +=
          '<div class="history-card" style="margin-bottom:10px">' +
            '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">' +
              '<span style="font-size:18px">' + tip.icon + '</span>' +
              '<strong style="font-size:13px;color:var(--text-bright)">' + tip.title + '</strong>' +
            '</div>' +
            '<p style="font-size:12px;color:var(--text-muted);margin:0 0 5px 0">' + tip.text + '</p>' +
            '<p style="font-size:12px;color:#00e676;margin:0">&#128161; ' + tip.advice + '</p>' +
          '</div>';
      });
      container.innerHTML = html;
    }
  });
</script>
</body>
</html>
